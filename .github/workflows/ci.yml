name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.14.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run deploy:check
      - run: pnpm run worker:typecheck
      - run: pnpm run worker:test
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm exec wrangler deploy --dry-run
